name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  toolkit:
    name: Native skill and tooling
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON and Python
        run: |
          python3 -m json.tool .codex-plugin/plugin.json >/dev/null
          python3 -m json.tool .agents/plugins/marketplace.json >/dev/null
          python3 -m py_compile skills/wp-fullstack-dev/scripts/scaffold.py
          python3 -m unittest skills/wp-fullstack-dev/scripts/test_scaffold.py

      - name: Validate shell scripts
        run: |
          bash -n skills/wp-fullstack-dev/scripts/detect-project.sh
          bash -n skills/wp-fullstack-dev/scripts/validate.sh
          bash -n skills/wp-fullstack-dev/scripts/package-plugin.sh

  php:
    name: PHP - ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard-plugin
            path: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
            composer: true
          - name: basic-plugin
            path: skills/wp-fullstack-dev/assets/plugin-starter
            composer: true
          - name: dynamic-block
            path: skills/wp-fullstack-dev/assets/block-plugin-starter
            composer: false
          - name: block-theme
            path: skills/wp-fullstack-dev/assets/block-theme-starter
            composer: false
          - name: child-theme
            path: skills/wp-fullstack-dev/assets/classic-theme-starter
            composer: false
          - name: woocommerce-extension
            path: skills/wp-fullstack-dev/assets/woocommerce-extension-starter
            composer: false
          - name: multisite-plugin
            path: skills/wp-fullstack-dev/assets/multisite-plugin-starter
            composer: false
          - name: wp-cli-plugin
            path: skills/wp-fullstack-dev/assets/wpcli-plugin-starter
            composer: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Validate PHP syntax
        shell: bash
        run: find "${{ matrix.path }}" -type f -name '*.php' -not -path '*/build/*' -not -path '*/vendor/*' -print0 | xargs -0 -n1 php -l

      - name: Validate Composer package
        if: matrix.composer
        working-directory: ${{ matrix.path }}
        run: composer validate --strict

      - name: Install PHP dependencies
        if: matrix.composer
        working-directory: ${{ matrix.path }}
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPCS
        if: matrix.composer
        working-directory: ${{ matrix.path }}
        run: composer lint

      - name: Run PHPUnit
        if: matrix.composer
        working-directory: ${{ matrix.path }}
        run: composer test

  javascript:
    name: JavaScript - ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: dashboard-plugin
            path: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
          - name: dynamic-block
            path: skills/wp-fullstack-dev/assets/block-plugin-starter

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install JavaScript dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Build assets
        working-directory: ${{ matrix.path }}
        run: npm run build

      - name: Run Jest
        working-directory: ${{ matrix.path }}
        run: npm test -- --runInBand

  playwright:
    name: Playwright - dashboard-plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: skills/wp-fullstack-dev/assets/dashboard-plugin-starter/package-lock.json

      - name: Install JavaScript dependencies
        working-directory: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
        run: npm ci

      - name: Build dashboard assets
        working-directory: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
        run: npm run build

      - name: Install Chromium
        working-directory: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
        run: npx playwright install --with-deps chromium

      - name: Start WordPress test environment
        working-directory: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
        run: npm run env:start

      - name: Activate example plugins
        working-directory: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
        run: npx wp-env run cli wp plugin activate --all

      - name: Run Playwright
        working-directory: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
        run: npm run test:e2e

      - name: Stop WordPress test environment
        if: always()
        working-directory: skills/wp-fullstack-dev/assets/dashboard-plugin-starter
        run: npm run env:stop
