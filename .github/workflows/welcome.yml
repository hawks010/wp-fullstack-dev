name: Welcome contributors

on:
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          pr-message: Thanks for the pull request. Automated checks and path labels will run before maintainer review.
